version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: safeniche-postgres
    environment:
      POSTGRES_USER: safeniche
      POSTGRES_PASSWORD: safeniche123
      POSTGRES_DB: safeniche
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U safeniche']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
